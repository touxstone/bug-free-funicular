<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manual B | Estudio</title>
    <meta name="theme-color" content="#2457a6">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/main.css?v=20260629-2">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button only-mobile" id="menuButton" type="button" aria-label="Abrir indice">☰</button>
        <div class="brand">
          <span class="brand-mark">B</span>
          <div>
            <p class="brand-title">Manual B</p>
            <p class="brand-subtitle">Lectura de combate</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="review-top-button secondary" data-review-scope="exam" type="button">Examen</button>
          <button class="review-top-button" data-review-scope="weak" type="button">Repasar</button>
          <button class="icon-button" id="previousButton" type="button" aria-label="Seccion anterior">‹</button>
          <button class="icon-button" id="nextButton" type="button" aria-label="Seccion siguiente">›</button>
        </div>
      </header>

      <aside class="sidebar" id="sidebar">
        <div class="search-box">
          <label for="searchInput">Buscar</label>
          <input id="searchInput" type="search" placeholder="Señales, prioridad, luces...">
          <div class="search-feedback" id="searchFeedback" hidden></div>
        </div>
        <div class="progress-strip">
          <div>
            <strong id="doneCount">0</strong>
            <span>leidas</span>
          </div>
          <div>
            <strong id="doubtCount">0</strong>
            <span>dudas</span>
          </div>
          <div>
            <strong id="masteredCount">0</strong>
            <span>firmes</span>
          </div>
        </div>
        <section class="study-tools" aria-label="Herramientas de estudio">
          <div class="tool-block">
            <h2>Atajos</h2>
            <div class="quick-actions" id="quickActions"></div>
          </div>
          <div class="tool-block">
            <h2>Terminos calientes</h2>
            <div class="term-cloud" id="termCloud"></div>
          </div>
          <div class="tool-block" id="weakSpotBlock">
            <h2>Puntos flojos</h2>
            <div class="weak-list" id="weakList"></div>
          </div>
          <div class="tool-block">
            <h2>Datos</h2>
            <div class="data-actions">
              <button id="exportButton" type="button">Exportar</button>
              <button id="importButton" type="button">Importar</button>
              <button id="resetButton" type="button">Reset</button>
            </div>
            <input id="importFile" type="file" accept="application/json" hidden>
          </div>
        </section>
        <div class="index-mode" id="indexMode"></div>
        <nav class="chapter-list" id="chapterList" aria-label="Indice del manual"></nav>
      </aside>

      <main class="reader">
        <section class="results-panel" id="resultsPanel" hidden>
          <div class="section-eyebrow">Resultados</div>
          <div id="searchResults"></div>
        </section>

        <article class="study-view" id="studyView" aria-live="polite">
          <div class="loading-state">Cargando manual...</div>
        </article>
      </main>

      <aside class="study-rail" id="studyRail"></aside>

      <div class="mobile-backdrop" id="mobileBackdrop" hidden></div>
    </div>

    <dialog class="review-dialog" id="reviewDialog">
      <form method="dialog" class="review-shell">
        <header class="review-header">
          <div>
            <p class="section-eyebrow" id="reviewScope">Repaso</p>
            <h2 id="reviewTitle">Tarjetas</h2>
          </div>
          <button class="icon-button" value="cancel" type="submit" aria-label="Cerrar repaso">×</button>
        </header>
        <section class="review-card" id="reviewCard"></section>
        <footer class="review-actions" id="reviewActions"></footer>
      </form>
    </dialog>

    <script type="module" src="./src/main.js?v=20260629-2"></script>
  </body>
</html>
